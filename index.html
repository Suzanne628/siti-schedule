<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>제품팀 배포 일정</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F6F2;
  --surface:#FFFFFF;
  --border:rgba(0,0,0,0.07);
  --border-md:rgba(0,0,0,0.13);
  --text:#1A1A18;
  --text-sub:#6B6B67;
  --text-muted:#A8A8A4;
  --accent:#2D5BE3;
  --accent-soft:#EEF2FD;
  --radius:10px;
  --radius-sm:6px;
  --font:'Pretendard',-apple-system,sans-serif;
  --mono:'DM Mono',monospace;
  --wd-bg:#F6F5F0;--wd-alt:#EEECEA;--wd-t:#444441;
  --be-bg:#F4F3FE;--be-alt:#EFEDFC;--be-t:#3C3489;
  --fe-bg:#EDF9F4;--fe-alt:#E4F5EE;--fe-t:#085041;
  --des-bg:#FDF6EA;--des-alt:#F8F0E2;--des-t:#633806;
  --mkt-bg:#FDF2EE;--mkt-alt:#F8EAE4;--mkt-t:#712B13;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;min-height:100vh}
.shell{display:flex;flex-direction:column;min-height:100vh}

/* Topbar */
.topbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 24px;height:50px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.logo{font-size:14px;font-weight:600;letter-spacing:-0.3px}
.logo em{color:var(--accent);font-style:normal}
.toolbar{display:flex;gap:8px;align-items:center}
select{
  font-family:var(--font);font-size:12px;padding:5px 10px;
  border:1px solid var(--border-md);border-radius:var(--radius-sm);
  background:var(--bg);color:var(--text);cursor:pointer;outline:none;
}
select:focus{border-color:var(--accent)}
.btn{
  font-family:var(--font);font-size:12px;font-weight:500;
  padding:6px 14px;border-radius:var(--radius-sm);
  border:1px solid var(--border-md);background:var(--surface);
  color:var(--text);cursor:pointer;transition:background .15s;
}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#2450c8}

/* Main */
.main{padding:20px 24px;flex:1}
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface)}

/* Table */
table{border-collapse:collapse;font-size:11px;white-space:nowrap}
th,td{border:0.5px solid rgba(0,0,0,0.08)}

.th-group{
  text-align:center;font-size:10px;font-weight:600;
  padding:6px 8px;color:var(--text);background:#F0EFF0;
}
.th-sub{
  text-align:center;font-size:10px;font-weight:500;
  padding:5px 7px;color:var(--text-sub);background:#F5F5F3;
}
.grp-wd{background:#EEECEA;color:var(--wd-t)}
.grp-be{background:#E9E8FC;color:var(--be-t)}
.grp-fe{background:#DDF3EB;color:var(--fe-t)}
.grp-des{background:#FAEDDA;color:var(--des-t)}
.grp-mkt{background:#FAE8E2;color:var(--mkt-t)}

td{padding:6px 8px;vertical-align:middle;color:var(--text)}
.td-date{
  text-align:center;font-size:11px;font-weight:600;
  background:#F5F5F3;padding:6px 12px;white-space:nowrap;
}
.chip{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500}
.chip-admin{background:#E6F1FB;color:#0C447C}
.chip-siti{background:#DDF3EB;color:#085041}
.ver{font-size:10px;color:var(--text-muted);font-family:var(--mono);text-align:center;padding:6px 6px}
.name-cell{font-size:11px;font-weight:500;color:var(--text);white-space:normal;word-break:keep-all;min-width:80px;max-width:180px;text-align:center}
.content-cell{font-size:11px;color:var(--text-sub);min-width:56px;text-align:center;white-space:nowrap}
.detail-cell{font-size:11px;color:var(--text-sub);min-width:160px;max-width:320px;white-space:normal;line-height:1.5;text-align:left;word-break:keep-all}
.task-cell{font-size:11px;color:var(--text-sub);min-width:72px;max-width:110px;white-space:normal;line-height:1.45;text-align:left}
.wd-cell{text-align:center;font-size:11px;font-weight:500;padding:5px 6px}
.month-sep td{border-top:2px solid rgba(0,0,0,0.22) !important}

/* 아이콘 버튼 */
.icon-btn{
  display:inline-flex;align-items:center;justify-content:center;
  width:26px;height:26px;border-radius:5px;
  border:0.5px solid var(--border-md);background:var(--surface);
  color:var(--text-muted);cursor:pointer;padding:0;
  transition:all .12s;flex-shrink:0;
}
.icon-btn:hover{background:var(--bg);color:var(--text);border-color:var(--border-md)}
.icon-btn.edit:hover{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}
.icon-btn.del:hover{background:#FDEAEA;color:#A32D2D;border-color:#F09595}

/* Modal */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(20,20,18,.45);z-index:200;
  align-items:center;justify-content:center;
  backdrop-filter:blur(2px);
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--surface);border-radius:var(--radius);
  border:1px solid var(--border-md);padding:24px;width:500px;
  max-height:90vh;overflow-y:auto;
  animation:slideup .18s ease;
}
@keyframes slideup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.modal-title{font-size:15px;font-weight:600;margin-bottom:18px;color:var(--text)}
.fsec{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin:14px 0 8px}
.fg label{display:block;font-size:10px;font-weight:500;color:var(--text-muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px}
.fg input,.fg select{
  width:100%;font-family:var(--font);font-size:12px;
  padding:7px 10px;border:1px solid var(--border-md);
  border-radius:var(--radius-sm);background:var(--bg);
  color:var(--text);outline:none;
}
.fg input:focus,.fg select:focus{border-color:var(--accent);background:var(--surface)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}

/* Toast */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(16px);
  background:var(--text);color:#fff;font-size:12px;
  padding:9px 18px;border-radius:var(--radius-sm);
  opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.15);border-radius:3px}
</style>
</head>
<body>
<div class="shell">

<div class="topbar">
  <div style="display:flex;align-items:center;gap:10px">
    <button onclick="toggleKPI()" id="kpiBtn" title="KPI 지표" style="display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:var(--radius-sm);border:1px solid var(--border-md);background:var(--surface);color:var(--text-sub);cursor:pointer;transition:all .15s;padding:0;flex-shrink:0" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="if(!kpiOpen){this.style.borderColor='var(--border-md)';this.style.color='var(--text-sub)'}">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1.5" y="1.5" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.2" fill="none"/>
        <line x1="5.5" y1="1.5" x2="5.5" y2="14.5" stroke="currentColor" stroke-width="1.2"/>
      </svg>
    </button>
    <div class="logo">SITI 개발 세부 일정</div>
  </div>
  <div class="toolbar">
    <button class="btn" onclick="openWeekModal()" style="background:#1A1A18;color:#fff;border-color:#1A1A18">+ 주간 일정</button>
    <button class="btn btn-primary" onclick="openTaskModal()">+ 작업 일정</button>
  </div>
</div>

<div style="background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:42px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0">
  <div style="display:flex;align-items:center;gap:6px">
    <span style="font-size:12px;color:var(--text-muted)">배포:</span>
    <span style="font-size:12px;font-weight:500;color:var(--text)" id="rowCountLabel">0건</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <span style="font-size:12px;color:var(--text-muted)">제품</span>
    <select id="filterSel" onchange="render()" style="font-size:12px;padding:4px 8px;border:1px solid var(--border-md);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);cursor:pointer;outline:none">
      <option value="">전체</option>
      <option value="Admin">Admin</option>
      <option value="Siti">Siti</option>
    </select>
    <span style="font-size:12px;color:var(--text-muted);margin-left:4px">메뉴</span>
    <select id="filterMenu" onchange="render()" style="font-size:12px;padding:4px 8px;border:1px solid var(--border-md);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);cursor:pointer;outline:none">
      <option value="">전체</option>
      <option>홈</option>
      <option>티켓북</option>
      <option>커뮤니티</option>
      <option>보관함</option>
      <option>프로필</option>
      <option>공연</option>
      <option>채널</option>
      <option>DB</option>
      <option>전체</option>
    </select>
  </div>
</div>

<div class="main">
  <div class="table-wrap">
    <table id="mainTable">
      <thead>
        <tr>
          <th class="th-group" rowspan="2" style="min-width:60px;background:#F5F5F3"></th>
          <th class="th-group grp-wd" colspan="5">주간 워킹데이</th>
          <th class="th-group" rowspan="2" style="min-width:44px">분기</th>
          <th class="th-group" rowspan="2" style="min-width:72px">배포일</th>
          <th class="th-group" rowspan="2" style="min-width:52px">제품</th>
          <th class="th-group" rowspan="2" style="min-width:56px">버전</th>
          <th class="th-group" rowspan="2" style="min-width:120px">명칭</th>
          <th class="th-group" colspan="2">업데이트 상세</th>
          <th class="th-group grp-be" colspan="3">BE</th>
          <th class="th-group grp-fe" colspan="3">FE</th>
          <th class="th-group grp-des" colspan="3">Des</th>
          <th class="th-group grp-mkt" colspan="2">MKT</th>
        </tr>
        <tr>
          <th class="th-sub" style="background:var(--wd-bg);color:var(--wd-t);min-width:36px">팀</th>
          <th class="th-sub" style="background:var(--be-bg);color:var(--be-t);min-width:32px">BE</th>
          <th class="th-sub" style="background:var(--fe-bg);color:var(--fe-t);min-width:32px">FE</th>
          <th class="th-sub" style="background:var(--des-bg);color:var(--des-t);min-width:36px">Des</th>
          <th class="th-sub" style="background:var(--mkt-bg);color:var(--mkt-t);min-width:36px">MKT</th>
          <th class="th-sub" style="min-width:64px">메뉴</th>
          <th class="th-sub" style="min-width:200px">상세 내용</th>
          <th class="th-sub" style="background:var(--be-bg);min-width:80px">Siti</th>
          <th class="th-sub" style="background:var(--be-bg);min-width:80px">Admin</th>
          <th class="th-sub" style="background:var(--be-bg);min-width:44px">Data</th>
          <th class="th-sub" style="background:var(--fe-bg);min-width:80px">Siti</th>
          <th class="th-sub" style="background:var(--fe-bg);min-width:80px">Admin</th>
          <th class="th-sub" style="background:var(--fe-bg);min-width:90px">Event Code</th>
          <th class="th-sub" style="background:var(--des-bg);min-width:80px">Siti</th>
          <th class="th-sub" style="background:var(--des-bg);min-width:60px">Admin</th>
          <th class="th-sub" style="background:var(--des-bg);min-width:44px">MKT</th>
          <th class="th-sub" style="background:var(--mkt-bg);min-width:100px">Contents</th>
          <th class="th-sub" style="background:var(--mkt-bg);min-width:90px">Events</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

</div>

<!-- 주간 일정 모달 -->
<div class="modal-overlay" id="weekModal">
  <div class="modal" style="width:460px">
    <div class="modal-title">+ 주간 일정</div>

    <div style="margin-bottom:14px">
      <div class="fsec" style="margin-top:0;margin-bottom:8px">주간 워킹데이</div>
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px">
        <div class="fg">
          <label style="color:var(--wd-t)">팀</label>
          <select id="w-wd-team" style="width:100%;background:var(--wd-bg);color:var(--wd-t);font-weight:500">
            <option>0</option><option>1</option><option>2</option><option>3</option><option>4</option><option selected>5</option>
          </select>
        </div>
        <div class="fg">
          <label style="color:var(--be-t)">BE</label>
          <select id="w-wd-be" style="width:100%;background:var(--be-bg);color:var(--be-t);font-weight:500">
            <option>0</option><option>1</option><option>2</option><option>3</option><option>4</option><option selected>5</option>
          </select>
        </div>
        <div class="fg">
          <label style="color:var(--fe-t)">FE</label>
          <select id="w-wd-fe" style="width:100%;background:var(--fe-bg);color:var(--fe-t);font-weight:500">
            <option>0</option><option>1</option><option>2</option><option>3</option><option>4</option><option selected>5</option>
          </select>
        </div>
        <div class="fg">
          <label style="color:var(--des-t)">Des</label>
          <select id="w-wd-des" style="width:100%;background:var(--des-bg);color:var(--des-t);font-weight:500">
            <option>0</option><option>1</option><option>2</option><option>3</option><option>4</option><option selected>5</option>
          </select>
        </div>
        <div class="fg">
          <label style="color:var(--mkt-t)">MKT</label>
          <select id="w-wd-mkt" style="width:100%;background:var(--mkt-bg);color:var(--mkt-t);font-weight:500">
            <option>0</option><option>1</option><option>2</option><option>3</option><option>4</option><option selected>5</option>
          </select>
        </div>
      </div>
    </div>

    <div class="fg" style="margin-bottom:10px">
      <label>배포일</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input id="w-date-picker" type="date" onchange="onDateChange(this.value)" style="flex:1;font-family:var(--font);font-size:12px;padding:7px 10px;border:1px solid var(--border-md);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);outline:none;cursor:pointer"/>
        <div id="w-date-preview" style="font-size:12px;font-weight:500;color:var(--text-sub);min-width:90px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);text-align:center;white-space:nowrap">날짜를 선택하세요</div>
      </div>
      <input id="w-date" type="hidden" value=""/>
    </div>

    <div class="fg" style="margin-bottom:10px">
      <label>제품</label>
      <select id="w-product" style="width:100%">
        <option value="Siti" selected>Siti</option>
        <option value="Admin">Admin</option>
      </select>
    </div>

    <div class="fg" style="margin-bottom:10px">
      <label>버전</label>
      <input id="w-ver" type="text" placeholder="예: v2.5.0" style="width:100%"/>
    </div>

    <div class="fg" style="margin-bottom:10px">
      <label>명칭</label>
      <input id="w-name" type="text" placeholder="예: 이벤트 대응" style="width:100%"/>
    </div>

    <div class="fsec" style="margin-top:4px">업데이트 상세</div>

    <div id="w-pairs"></div>
    <button onclick="addPair()" style="width:100%;margin-top:6px;padding:7px;font-family:var(--font);font-size:12px;border:1px solid var(--border-md);border-radius:var(--radius-sm);background:transparent;color:var(--text-sub);cursor:pointer;transition:all .15s" onmouseover="this.style.background='var(--accent-soft)';this.style.color='var(--accent)';this.style.borderColor='var(--accent)'" onmouseout="this.style.background='transparent';this.style.color='var(--text-sub)';this.style.borderColor='var(--border-md)'">+ 업데이트 상세 추가</button>

    <div class="modal-actions">
      <button class="btn" onclick="closeWeekModal()">취소</button>
      <button class="btn btn-primary" onclick="submitWeekRow()">추가하기</button>
    </div>
  </div>
</div>

<!-- 작업 일정 모달 -->
<div class="modal-overlay" id="taskModal">
  <div class="modal" style="width:500px">
    <div class="modal-title">+ 작업 일정</div>

    <div class="fsec" style="margin-top:0">워킹데이</div>
    <div class="g5" style="margin-bottom:10px">
      <div class="fg"><label style="color:var(--wd-t)">팀</label><input id="t-wd-team" type="text" placeholder="5일" style="background:var(--wd-bg);color:var(--wd-t)"/></div>
      <div class="fg"><label style="color:var(--be-t)">BE</label><input id="t-wd-be" type="text" placeholder="5일" style="background:var(--be-bg);color:var(--be-t)"/></div>
      <div class="fg"><label style="color:var(--fe-t)">FE</label><input id="t-wd-fe" type="text" placeholder="5일" style="background:var(--fe-bg);color:var(--fe-t)"/></div>
      <div class="fg"><label style="color:var(--des-t)">Des</label><input id="t-wd-des" type="text" placeholder="5일" style="background:var(--des-bg);color:var(--des-t)"/></div>
      <div class="fg"><label style="color:var(--mkt-t)">MKT</label><input id="t-wd-mkt" type="text" placeholder="5일" style="background:var(--mkt-bg);color:var(--mkt-t)"/></div>
    </div>

    <div class="fsec">BE 업무</div>
    <div class="g2" style="margin-bottom:10px">
      <div class="fg"><label style="color:var(--be-t)">Siti</label><input id="t-be-siti" type="text" style="background:var(--be-bg)"/></div>
      <div class="fg"><label style="color:var(--be-t)">Admin</label><input id="t-be-admin" type="text" style="background:var(--be-bg)"/></div>
    </div>

    <div class="fsec">FE 업무</div>
    <div class="g2" style="margin-bottom:10px">
      <div class="fg"><label style="color:var(--fe-t)">Siti</label><input id="t-fe-siti" type="text" style="background:var(--fe-bg)"/></div>
      <div class="fg"><label style="color:var(--fe-t)">Event Code</label><input id="t-fe-event" type="text" style="background:var(--fe-bg)"/></div>
    </div>

    <div class="fsec">Des 업무</div>
    <div class="g2" style="margin-bottom:10px">
      <div class="fg"><label style="color:var(--des-t)">Siti</label><input id="t-des-siti" type="text" style="background:var(--des-bg)"/></div>
      <div class="fg"><label style="color:var(--des-t)">Admin</label><input id="t-des-admin" type="text" style="background:var(--des-bg)"/></div>
    </div>

    <div class="fsec">MKT 업무</div>
    <div class="g2" style="margin-bottom:10px">
      <div class="fg"><label style="color:var(--mkt-t)">Contents</label><input id="t-mkt-cont" type="text" style="background:var(--mkt-bg)"/></div>
      <div class="fg"><label style="color:var(--mkt-t)">Events</label><input id="t-mkt-evt" type="text" style="background:var(--mkt-bg)"/></div>
    </div>

    <div class="modal-actions">
      <button class="btn" onclick="closeTaskModal()">취소</button>
      <button class="btn btn-primary" onclick="submitTaskRow()">추가하기</button>
    </div>
  </div>
</div>

<style>
#kpiPanel{
  position:fixed;top:50px;left:0;width:300px;height:calc(100vh - 50px);
  background:var(--surface);border-right:1px solid var(--border-md);
  z-index:90;transform:translateX(-100%);transition:transform .22s ease;
  overflow-y:auto;padding:18px 16px;
}
#kpiPanel.open{transform:translateX(0)}

function renderKPI(){
  const container=document.getElementById('kpiQuarters');
  container.innerHTML=kpiData.map((q,qi)=>`
    <div class="kpi-quarter">
      <div class="kpi-q-header" onclick="toggleQ(${qi})">
        <div class="kpi-q-left">
          <span class="kpi-q-arrow ${q.open?'open':''}">▶</span>
          <span>${q.q}</span>
        </div>
        <span style="font-size:10px;color:var(--text-muted);font-weight:400">${q.items.length}개</span>
      </div>
      <div class="kpi-body ${q.open?'open':''}">
        ${q.items.map((item,ii)=>`
          <div class="kpi-item" id="kpi-item-${qi}-${ii}">
            <div style="flex:1;min-width:0">
              <div class="kpi-lbl">${item.label}${item.note?`<small>${item.note}</small>`:''}</div>
            </div>
            <span class="kpi-val">${item.value}</span>
            <div class="kpi-item-actions">
              <button class="icon-btn edit" onclick="startEditKPI(${qi},${ii},event)" title="수정">${SVG_PEN}</button>
              <button class="icon-btn del" onclick="deleteKPI(${qi},${ii})" title="삭제">${SVG_TRASH}</button>
            </div>
          </div>
        `).join('')}
        <button class="kpi-add-btn" onclick="startAddKPI(${qi},event)">+ 항목 추가</button>
      </div>
    </div>
  `).join('');
}

function toggleQ(qi){
  kpiData[qi].open=!kpiData[qi].open;
  renderKPI();
}

function startEditKPI(qi,ii,e){
  e.stopPropagation();
  const item=kpiData[qi].items[ii];
  const el=document.getElementById(`kpi-item-${qi}-${ii}`);
  el.outerHTML=`
    <div class="kpi-edit-row" id="kpi-edit-${qi}-${ii}">
      <input id="ke-lbl-${qi}-${ii}" type="text" placeholder="항목명" value="${item.label}"/>
      <input id="ke-note-${qi}-${ii}" type="text" placeholder="보조 설명 (선택)" value="${item.note}"/>
      <input id="ke-val-${qi}-${ii}" type="text" placeholder="값" value="${item.value}"/>
      <div class="kpi-edit-btns">
        <button onclick="cancelEditKPI(${qi})">취소</button>
        <button class="save" onclick="saveEditKPI(${qi},${ii})">저장</button>
      </div>
    </div>`;
}

function saveEditKPI(qi,ii){
  const lbl=document.getElementById(`ke-lbl-${qi}-${ii}`).value.trim();
  const note=document.getElementById(`ke-note-${qi}-${ii}`).value.trim();
  const val=document.getElementById(`ke-val-${qi}-${ii}`).value.trim();
  if(!lbl||!val) return;
  kpiData[qi].items[ii]={label:lbl,note,value:val};
  renderKPI();
}

function cancelEditKPI(qi){
  renderKPI();
}

function deleteKPI(qi,ii){
  if(!confirm(`"${kpiData[qi].items[ii].label}" 항목을 삭제할까요?`)) return;
  kpiData[qi].items.splice(ii,1);
  renderKPI();
}

function startAddKPI(qi,e){
  e.stopPropagation();
  const body=e.target.parentElement;
  const addBtn=e.target;
  const div=document.createElement('div');
  div.className='kpi-edit-row';
  div.id=`kpi-add-${qi}`;
  div.innerHTML=`
    <input id="ka-lbl-${qi}" type="text" placeholder="항목명"/>
    <input id="ka-note-${qi}" type="text" placeholder="보조 설명 (선택)"/>
    <input id="ka-val-${qi}" type="text" placeholder="값"/>
    <div class="kpi-edit-btns">
      <button onclick="cancelEditKPI(${qi})">취소</button>
      <button class="save" onclick="saveAddKPI(${qi})">추가</button>
    </div>`;
  body.insertBefore(div,addBtn);
  document.getElementById(`ka-lbl-${qi}`).focus();
}

function saveAddKPI(qi){
  const lbl=document.getElementById(`ka-lbl-${qi}`).value.trim();
  const note=document.getElementById(`ka-note-${qi}`).value.trim();
  const val=document.getElementById(`ka-val-${qi}`).value.trim();
  if(!lbl||!val){alert('항목명과 값을 입력해주세요.');return;}
  kpiData[qi].items.push({label:lbl,note,value:val});
  renderKPI();
}

function render(){
  const filter=document.getElementById('filterSel').value;
  const menuFilter=document.getElementById('filterMenu').value;
  const filtered=rows.filter(r=>
    (!filter||r.product===filter)&&
    (!menuFilter||r.menu.includes(menuFilter))
  );

  filtered.sort((a,b)=>{
    const parse=s=>{const m=s.match(/(\d+)\/(\d+)/);return m?parseInt(m[1])*100+parseInt(m[2]):0;};
    const dc=parse(a.date)-parse(b.date);
    if(dc!==0) return dc;
    return a.product.localeCompare(b.product);
  });

  // 배포일 rowspan 계산
  const dateCount={};
  filtered.forEach(r=>{dateCount[r.date]=(dateCount[r.date]||0)+1;});

  // 같은 date+product 묶음에서 첫 번째 행만 wd/product/액션 셀 출력 (rowspan)
  const groupCount={};
  filtered.forEach(r=>{
    const k=r.date+'|'+r.product;
    groupCount[k]=(groupCount[k]||0)+1;
  });

  const dateRendered={};
  const groupRendered={};
  let lastMonth=-1;
  const tbody=document.getElementById('tbody');
  let html='';

  filtered.forEach((r,i)=>{
    const alt=i%2===1;
    const bg=alt?'rgba(0,0,0,0.014)':'transparent';
    const ri=rows.indexOf(r);
    const gk=r.date+'|'+r.product;
    const isFirstInGroup=!groupRendered[gk];
    const isFirstInDate=!dateRendered[r.date];
    const gspan=groupCount[gk];
    const dspan=dateCount[r.date];

    const curMonth=parseInt((r.date.match(/^(\d+)\//)||[])[1]||-1);
    const monthBorder=(!groupRendered[gk]&&curMonth!==lastMonth&&lastMonth!==-1);
    if(isFirstInGroup) lastMonth=curMonth;
    const borderTop=monthBorder?'border-top:2px solid rgba(0,0,0,0.25)!important':'';

    html+=`<tr class="${monthBorder?'month-sep':''}">`;

    // 액션 버튼 — 그룹 첫 행만 rowspan
    if(isFirstInGroup){
      html+=`<td rowspan="${gspan}" style="text-align:center;padding:4px 6px;background:var(--surface);white-space:nowrap;vertical-align:middle">
        <div style="display:flex;flex-direction:row;gap:4px;align-items:center;justify-content:center">
          <button class="icon-btn edit" onclick="editRow(${ri})" title="수정">${SVG_PEN}</button>
          <button class="icon-btn del" onclick="confirmDelete(${ri})" title="삭제">${SVG_TRASH}</button>
        </div>
      </td>`;
      groupRendered[gk]=true;
    }

    // 주간 워킹데이 — 배포일 첫 행만 rowspan (같은 배포일 전체 병합)
    if(isFirstInDate){
      const dateFirst=filtered.find(x=>x.date===r.date);
      const wt=dateFirst.wd_team||r.wd_team||'';
      const wb=dateFirst.wd_be||r.wd_be||'';
      const wf=dateFirst.wd_fe||r.wd_fe||'';
      const wd=dateFirst.wd_des||r.wd_des||'';
      const wm=dateFirst.wd_mkt||r.wd_mkt||'';
      html+=`<td rowspan="${dspan}" class="wd-cell" style="background:var(--wd-bg);color:var(--wd-t);vertical-align:middle">${wt}</td>`;
      html+=`<td rowspan="${dspan}" class="wd-cell" style="background:var(--be-bg);color:var(--be-t);vertical-align:middle">${wb}</td>`;
      html+=`<td rowspan="${dspan}" class="wd-cell" style="background:var(--fe-bg);color:var(--fe-t);vertical-align:middle">${wf}</td>`;
      html+=`<td rowspan="${dspan}" class="wd-cell" style="background:var(--des-bg);color:var(--des-t);vertical-align:middle">${wd}</td>`;
      html+=`<td rowspan="${dspan}" class="wd-cell" style="background:var(--mkt-bg);color:var(--mkt-t);vertical-align:middle">${wm}</td>`;
    }

    // 배포일 — date 첫 행만 rowspan
    if(isFirstInDate){
      const dm=parseInt((r.date.match(/^(\d+)\//)||[])[1]||0);
      const qLabel=dm<=3?'1Q':dm<=6?'2Q':dm<=9?'3Q':'4Q';
      html+=`<td class="td-date" rowspan="${dspan}" style="vertical-align:middle;text-align:center;font-size:10px;font-weight:600;color:var(--text-muted);background:#F5F5F3;padding:4px 6px">${qLabel}</td>`;
      html+=`<td class="td-date" rowspan="${dspan}" style="vertical-align:middle">${r.date}</td>`;
      dateRendered[r.date]=true;
    }

    // 제품 — 그룹 첫 행만 rowspan
    if(isFirstInGroup){
      html+=`<td rowspan="${gspan}" style="text-align:center;padding:6px 8px;background:var(--surface);vertical-align:middle"><span class="chip chip-${r.product.toLowerCase()}">${r.product}</span></td>`;
    }

    // 버전, 명칭 — 그룹 첫 행만 rowspan
    if(isFirstInGroup){
      html+=`<td rowspan="${gspan}" class="ver" style="background:var(--surface);vertical-align:middle">${r.ver}</td>`;
      html+=`<td rowspan="${gspan}" class="name-cell" style="background:var(--surface);vertical-align:middle">${r.name}</td>`;
    }
    html+=`<td class="content-cell" style="background:${bg}">${r.menu}</td>`;
    html+=`<td class="detail-cell" style="background:${bg}">${r.detail}</td>`;

    html+=tc(r.be_siti, alt?'var(--be-alt)':'var(--be-bg)');
    html+=tc(r.be_admin, alt?'var(--be-alt)':'var(--be-bg)');
    html+=tc(r.be_data, alt?'var(--be-alt)':'var(--be-bg)','text-align:center');
    html+=tc(r.fe_siti, alt?'var(--fe-alt)':'var(--fe-bg)');
    html+=tc(r.fe_admin, alt?'var(--fe-alt)':'var(--fe-bg)');
    html+=tc(r.fe_event, alt?'var(--fe-alt)':'var(--fe-bg)');
    html+=tc(r.des_siti, alt?'var(--des-alt)':'var(--des-bg)');
    html+=tc(r.des_admin, alt?'var(--des-alt)':'var(--des-bg)');
    html+=tc(r.des_mkt, alt?'var(--des-alt)':'var(--des-bg)');
    html+=tc(r.mkt_cont, alt?'var(--mkt-alt)':'var(--mkt-bg)');
    html+=tc(r.mkt_evt, alt?'var(--mkt-alt)':'var(--mkt-bg)');

    html+=`</tr>`;
  });

  tbody.innerHTML=html||`<tr><td colspan="23" style="text-align:center;padding:24px;color:var(--text-muted);font-size:12px">일치하는 일정이 없습니다</td></tr>`;
  const countEl=document.getElementById('rowCountLabel');
  if(countEl) countEl.textContent=filtered.length+'건';
}

function onDateChange(val){
  if(!val) return;
  const days=['일','월','화','수','목','금','토'];
  const d=new Date(val+'T00:00:00');
  const m=d.getMonth()+1;
  const day=d.getDate();
  const dow=days[d.getDay()];
  const formatted=`${m}/${day} (${dow})`;
  document.getElementById('w-date').value=formatted;
  document.getElementById('w-date-preview').textContent=formatted;
  document.getElementById('w-date-preview').style.color='var(--text)';
}

function todayPlaceholder(){
  const d=new Date();
  const days=['일','월','화','수','목','금','토'];
  return `${d.getMonth()+1}/${d.getDate()} (${days[d.getDay()]})`;
}

const MENU_OPTS=['홈','티켓북','커뮤니티','보관함','프로필','DB'];

function makePair(idx){
  const chips=MENU_OPTS.map(m=>`
    <label class="chip-opt" style="display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;border:1px solid var(--border-md);font-size:11px;cursor:pointer;user-select:none;transition:all .12s;background:var(--bg);color:var(--text-sub);margin:0 4px 4px 0">
      <input type="checkbox" value="${m}" ${m==='홈'?'checked':''} style="display:none" onchange="updateChip(this)"/>
      ${m}
    </label>`).join('');
  return `<div class="pair-row" data-idx="${idx}" style="border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px;background:var(--bg)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <label style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text-muted)">메뉴</label>
      ${idx>0?`<button class="icon-btn del" onclick="removePair(${idx})" title="삭제">${SVG_TRASH}</button>`:''}
    </div>
    <div class="chip-group" style="display:flex;flex-wrap:wrap;margin-bottom:10px">${chips}</div>
    <div>
      <label style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text-muted);display:block;margin-bottom:4px">상세 내용</label>
      <textarea class="pair-detail" rows="2" placeholder="업데이트 기능 설명" style="width:100%;font-family:var(--font);font-size:12px;padding:7px 10px;border:1px solid var(--border-md);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);outline:none;resize:vertical"></textarea>
    </div>
  </div>`;
}

function updateChip(input){
  const label=input.parentElement;
  if(input.checked){
    label.style.background='var(--accent)';
    label.style.color='#fff';
    label.style.borderColor='var(--accent)';
  } else {
    label.style.background='var(--bg)';
    label.style.color='var(--text-sub)';
    label.style.borderColor='var(--border-md)';
  }
}

function initChips(container){
  container.querySelectorAll('.chip-opt input[type=checkbox]').forEach(cb=>{
    updateChip(cb);
  });
}

let pairCount=1;

function addPair(){
  const container=document.getElementById('w-pairs');
  const div=document.createElement('div');
  div.innerHTML=makePair(pairCount++);
  const el=div.firstElementChild;
  container.appendChild(el);
  initChips(el);
}

function removePair(idx){
  const el=document.querySelector(`.pair-row[data-idx="${idx}"]`);
  if(el) el.remove();
}

let deleteTargetIdx=-1;

function confirmDelete(idx){
  deleteTargetIdx=idx;
  const r=rows[idx];
  document.getElementById('deleteTarget').textContent=`${r.date} · ${r.product} · ${r.name}`;
  document.getElementById('deleteModal').classList.add('open');
}

function closeDeleteModal(){
  document.getElementById('deleteModal').classList.remove('open');
  deleteTargetIdx=-1;
}

function executeDelete(){
  if(deleteTargetIdx<0) return;
  rows.splice(deleteTargetIdx,1);
  closeDeleteModal();
  render();
  showToast('일정이 삭제되었습니다');
}

let editTargetIdx=-1;

function editRow(idx){
  editTargetIdx=idx;
  const r=rows[idx];

  document.getElementById('w-date').value=r.date;
  document.getElementById('w-date-preview').textContent=r.date;
  document.getElementById('w-date-preview').style.color='var(--text)';
  document.getElementById('w-date-picker').value='';
  document.getElementById('w-wd-team').value=(r.wd_team||'5일').replace(/[^0-9]/g,'')||'5';
  document.getElementById('w-wd-be').value=(r.wd_be||'5일').replace(/[^0-9]/g,'')||'5';
  document.getElementById('w-wd-fe').value=(r.wd_fe||'5일').replace(/[^0-9]/g,'')||'5';
  document.getElementById('w-wd-des').value=(r.wd_des||'5일').replace(/[^0-9]/g,'')||'5';
  document.getElementById('w-wd-mkt').value=(r.wd_mkt||'5일').replace(/[^0-9]/g,'')||'5';

  document.getElementById('w-product').value=r.product;
  document.getElementById('w-ver').value=r.ver==='—'?'':r.ver;
  document.getElementById('w-name').value=r.name;

  pairCount=1;
  const pairsEl=document.getElementById('w-pairs');
  pairsEl.innerHTML=makePair(0);
  const firstPair=pairsEl.firstElementChild;

  const menuTokens=(r.menu||'').split(/[·\n]/);
  firstPair.querySelectorAll('.chip-opt input').forEach(cb=>{
    cb.checked=menuTokens.includes(cb.value);
    updateChip(cb);
  });
  const detailEl=firstPair.querySelector('.pair-detail');
  if(detailEl) detailEl.value=r.detail||'';

  document.getElementById('weekModal').classList.add('open');
  document.getElementById('weekModal').querySelector('.modal-title').textContent='주간 일정 수정';
  document.querySelector('#weekModal .btn-primary').textContent='저장하기';
}

function openWeekModal(){
  editTargetIdx=-1;
  document.getElementById('weekModal').querySelector('.modal-title').textContent='+ 주간 일정';
  document.querySelector('#weekModal .btn-primary').textContent='추가하기';
  document.getElementById('w-date-picker').value='';
  document.getElementById('w-date').value='';
  document.getElementById('w-date-preview').textContent='날짜를 선택하세요';
  document.getElementById('w-date-preview').style.color='var(--text-sub)';
  document.getElementById('w-wd-team').value='5';
  document.getElementById('w-wd-be').value='5';
  document.getElementById('w-wd-fe').value='5';
  document.getElementById('w-wd-des').value='5';
  document.getElementById('w-wd-mkt').value='5';
  document.getElementById('w-product').value='Siti';
  document.getElementById('w-ver').value='';
  document.getElementById('w-name').value='';
  pairCount=1;
  const pairsEl=document.getElementById('w-pairs');
  pairsEl.innerHTML=makePair(0);
  initChips(pairsEl.firstElementChild);
  document.getElementById('weekModal').classList.add('open');
  setTimeout(()=>document.getElementById('w-date').focus(),100);
}

function closeWeekModal(){
  document.getElementById('weekModal').classList.remove('open');
}

function openTaskModal(){
  ['t-wd-team','t-wd-be','t-wd-fe','t-wd-des','t-wd-mkt',
   't-be-siti','t-be-admin','t-fe-siti','t-fe-event',
   't-des-siti','t-des-admin','t-mkt-cont','t-mkt-evt'
  ].forEach(id=>{document.getElementById(id).value='';});
  document.getElementById('taskModal').classList.add('open');
}

function closeTaskModal(){
  document.getElementById('taskModal').classList.remove('open');
}

function submitTaskRow(){
  const g=id=>document.getElementById(id).value.trim();
  const lastRow=rows[rows.length-1];
  const date=lastRow?lastRow.date:'';
  if(!date){alert('먼저 주간 일정을 추가해주세요.');return;}
  const target=rows.filter(r=>r.date===date)[0];
  if(target){
    if(g('t-wd-team')) target.wd_team=g('t-wd-team');
    if(g('t-wd-be'))   target.wd_be=g('t-wd-be');
    if(g('t-wd-fe'))   target.wd_fe=g('t-wd-fe');
    if(g('t-wd-des'))  target.wd_des=g('t-wd-des');
    if(g('t-wd-mkt'))  target.wd_mkt=g('t-wd-mkt');
    if(g('t-be-siti'))  target.be_siti=(target.be_siti?target.be_siti+'\n':'')+g('t-be-siti');
    if(g('t-be-admin')) target.be_admin=(target.be_admin?target.be_admin+'\n':'')+g('t-be-admin');
    if(g('t-fe-siti'))  target.fe_siti=(target.fe_siti?target.fe_siti+'\n':'')+g('t-fe-siti');
    if(g('t-fe-event')) target.fe_event=(target.fe_event?target.fe_event+'\n':'')+g('t-fe-event');
    if(g('t-des-siti'))  target.des_siti=(target.des_siti?target.des_siti+'\n':'')+g('t-des-siti');
    if(g('t-des-admin')) target.des_admin=(target.des_admin?target.des_admin+'\n':'')+g('t-des-admin');
    if(g('t-mkt-cont')) target.mkt_cont=(target.mkt_cont?target.mkt_cont+'\n':'')+g('t-mkt-cont');
    if(g('t-mkt-evt'))  target.mkt_evt=(target.mkt_evt?target.mkt_evt+'\n':'')+g('t-mkt-evt');
  }
  closeTaskModal();
  render();
  showToast('작업 일정이 업데이트되었습니다');
}

function submitWeekRow(){
  const dateInput=document.getElementById('w-date').value.trim();
  const date=dateInput;
  if(!date){alert('배포일을 선택해주세요.');return;}
  const product=document.getElementById('w-product').value;
  const ver=document.getElementById('w-ver').value.trim()||'-';
  const name=document.getElementById('w-name').value.trim();
  if(!name){alert('명칭을 입력해주세요.');return;}

  const gw=id=>document.getElementById(id).value.trim();
  const wd_team=gw('w-wd-team')+'일';
  const wd_be=gw('w-wd-be')+'일';
  const wd_fe=gw('w-wd-fe')+'일';
  const wd_des=gw('w-wd-des')+'일';
  const wd_mkt=gw('w-wd-mkt')+'일';

  const pairs=[...document.querySelectorAll('#w-pairs .pair-row')].map(row=>{
    const checked=[...row.querySelectorAll('.chip-opt input:checked')].map(cb=>cb.value);
    const menus=checked.join('·');
    const db=checked.includes('DB')?'DB':'';
    const detail=row.querySelector('.pair-detail').value.trim();
    return {menus,db,detail};
  });

  const menuStr=pairs.map(p=>p.menus).filter(Boolean).join('\n');
  const detailStr=pairs.map(p=>p.detail).filter(Boolean).join('\n');

  if(editTargetIdx>=0){
    const r=rows[editTargetIdx];
    r.date=date; r.product=product; r.ver=ver; r.name=name;
    r.menu=pairs[0]?pairs[0].menus:'';
    r.detail=pairs[0]?pairs[0].detail:'';
    r.wd_team=wd_team; r.wd_be=wd_be; r.wd_fe=wd_fe; r.wd_des=wd_des; r.wd_mkt=wd_mkt;
    closeWeekModal();
    render();
    showToast(`"${name}" 일정이 수정되었습니다`);
    editTargetIdx=-1;
    return;
  }

  // 페어 개수만큼 별도 row 추가 (첫 행에만 wd 값, 나머지는 동일 date+product 공유)
  pairs.forEach((p,pi)=>{
    rows.push({
      date, product, ver, name,
      menu:p.menus, detail:p.detail,
      wd_team:pi===0?wd_team:'', wd_be:pi===0?wd_be:'', wd_fe:pi===0?wd_fe:'',
      wd_des:pi===0?wd_des:'', wd_mkt:pi===0?wd_mkt:'',
      be_siti:'', be_admin:'', be_data:p.db||'',
      fe_siti:'', fe_admin:'', fe_event:'',
      des_siti:'', des_admin:'', des_mkt:'',
      mkt_cont:'', mkt_evt:'',
      _groupKey: date+'|'+product,
    });
  });

  closeWeekModal();
  render();
  showToast(`"${name}" 주간 일정이 추가되었습니다`);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}

document.getElementById('weekModal').addEventListener('click',e=>{if(e.target===document.getElementById('weekModal'))closeWeekModal();});
document.getElementById('taskModal').addEventListener('click',e=>{if(e.target===document.getElementById('taskModal'))closeTaskModal();});
document.getElementById('deleteModal').addEventListener('click',e=>{if(e.target===document.getElementById('deleteModal'))closeDeleteModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeWeekModal();closeTaskModal();closeDeleteModal();}});
